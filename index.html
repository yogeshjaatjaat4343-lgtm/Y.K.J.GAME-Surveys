<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Earn</title>

<style>
body {
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
}
.box {
    margin:20px;
    padding:20px;
    border:2px solid gold;
    border-radius:15px;
    background:#111;
}
.btn {
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
}
input {
    width:80%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid gold;
    background:#000;
    color:white;
    text-align:center;
}
#back1 {
    background: linear-gradient(45deg, #ff7675, #fd79a8);
    color: white;
    font-weight: bold;
    box-shadow: 0 0 10px #ff7675;
    transition: 0.3s;
}
#back1:hover {
    transform: scale(1.05);
}
#back2 {
    background: linear-gradient(45deg, #00cec9, #0984e3);
    color: white;
    font-weight: bold;
    box-shadow: 0 0 10px #00cec9;
    transition: 0.3s;
}
#back2:hover {
    transform: scale(1.05);
}
</style>
</head>
<body>
<h2 style="color:gold;">🧾 Survey Earn System</h2>
<div class="box">
<p>Coins: <span id="coins">0</span></p>
<p style="font-size:12px;">100 Coins = ₹1</p>
<p id="minText" style="font-size:12px;">Min Withdraw = ₹1</p>
<p>Today: <span id="count">0</span>/4</p>
<!-- SURVEY BUTTONS -->
<button class="btn" id="back1" onclick="startCPX()">START SURVEY - CPX</button>
<button class="btn" id="back2" onclick="startTimeWall()">START SURVEY-timewall</button>
<button class="ogads-btn" onclick="startOGAds()">🔥 Earn Big Rewards</button>

<style>
.ogads-btn {
    width: 90%;
    padding: 14px;
    margin: 15px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    cursor: pointer;

    /* Gradient background */
    background: linear-gradient(45deg, #ff9f43, #ff6b6b, #f368e0);

    /* Glow effect */
    box-shadow: 0 0 10px #ff6b6b, 0 0 20px #f368e0;

    transition: 0.3s;
}

/* Hover effect */
.ogads-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #ff9f43, 0 0 40px #ff6b6b;
}

/* Animation (light move effect) */
.ogads-btn {
    background-size: 200% 200%;
    animation: glowMove 3s linear infinite;
}

@keyframes glowMove {
    0% { background-position: 0% }
    100% { background-position: 200% }
}
</style>
<button class="btn" style="background:#f1c40f;" onclick="dailyBonus()">🎁 DAILY BONUS</button>
<button class="btn" id="earnBtn1" onclick="startAd()">💰 Watch Ad & Earn</button>
<button class="btn" id="earnBtn2" onclick="startAd()">🚀 Instant Reward Task</button>
<br>
<input type="text" id="upi" placeholder="Enter UPI ID">
<button class="btn" style="background:#2ecc71;" onclick="withdraw()">WITHDRAW</button>
</div>
<script>
let userId = localStorage.getItem("uid");
if(!userId){
    userId = "user_" + Math.random().toString(36).substring(7);
    localStorage.setItem("uid", userId);
}
let coins = parseInt(localStorage.getItem("surveyCoins")) || 0;
let count = parseInt(localStorage.getItem("surveyCount")) || 0;
let lastDate = localStorage.getItem("surveyDate") || "";
let bonusDate = localStorage.getItem("bonusDate") || "";
let firstWithdrawDone = localStorage.getItem("firstWithdraw") || "no";
let firstSurveyClick = localStorage.getItem("firstSurveyClick") || "yes";
function checkDate(){
    let today = new Date().toDateString();
    if(today !== lastDate){
        count = 0;
        localStorage.setItem("surveyCount", 0);
        localStorage.setItem("surveyDate", today);
    }
}
function dailyBonus(){
    let today = new Date().toDateString();
    if(bonusDate === today){
        alert("आज का bonus already ले लिया");
        return;
    }
    coins += 50;
    fetch("https://y-k-j-game-surveys.onrender.com/update", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        userId: userId,
        coins: coins
    })
});
    localStorage.setItem("surveyCoins", coins);
    bonusDate = today;
    localStorage.setItem("bonusDate", today);
    alert("🎁 50 Coins Added");
    update();
}
function update(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("count").innerText = count;
    let min = firstWithdrawDone === "yes" ? 250 : 1;
    document.getElementById("minText").innerText = "Min Withdraw = ₹" + min;
}
async function loadCoins(){
    try{
        let res = await fetch("https://y-k-j-game-surveys.onrender.com/user/" + userId);
        let data = await res.json();
        coins = Math.max(coins, data.coins || 0);
localStorage.setItem("surveyCoins", coins);
        update();
    }catch(e){
        console.log("Backend not reachable");
    }
}
function startCPX(){
    if(firstSurveyClick === "yes"){
        alert(`🔥 INTRODUCTION 🔥
1. पहले प्रोफाइल पूरी करें
2. ईमानदारी से survey करें
3. बार-बार कोशिश करें`);
        localStorage.setItem("firstSurveyClick", "no");
    }
    openSurvey();
}
function startTimeWall(){
    window.open("https://timewall.io/users/login?oid=e758de0231cee508&uid=" + userId, "_blank");
}
function openSurvey(){
    document.body.innerHTML = `
    <div style="background:black; height:100vh;">
        <button onclick="location.reload()" 
        style="position:fixed; top:10px; left:10px; z-index:999; padding:10px;">
        🔙 Back
        </button>
        <iframe 
        src="https://offers.cpx-research.com/index.php?app_id=32558&ext_user_id=${userId}"
        width="100%" 
        height="100%" 
        style="border:none;">
        </iframe>
    </div>`;
}
function startOGAds(){
    window.open("https://checkmyapp.store/cl/i/2711mp?user_id=" + userId, "_blank");
}
function withdraw(){
    let upi = document.getElementById("upi").value;
    if(!upi){
        alert("Enter UPI");
        return;
    }
    let minCoins = (firstWithdrawDone === "no") ? 100 : 25000;
    if(coins < minCoins){
        alert("Minimum ₹" + (minCoins/100) + " required");
        return;
    }
    let amount = coins / 100;
    let deductedCoins = coins;
    coins = 0;
    localStorage.setItem("surveyCoins", coins);
    localStorage.setItem("firstWithdraw", "yes");
    fetch("https://y-k-j-game-surveys.onrender.com/update", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        userId: userId,
        coins: 0
    })
});
    update();
    let msg = `Withdraw Request
Coins: ${deductedCoins}
Amount: ₹${amount}
UPI: ${upi}`;
    let url = "https://wa.me/916375843097?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");
    alert("Withdraw request sent. Coins deducted.");
}
checkDate();
loadCoins();
update();
let adStartTime = 0;
function startAd(){
    adStartTime = Date.now();
    window.open("https://www.profitablecpmratenetwork.com/tet8ney19?key=f087d6d9ebc742fdc39a8d4b69790990", "_blank");
}
window.addEventListener("focus", function(){
    if(adStartTime === 0) return;
    let timeSpent = (Date.now() - adStartTime) / 1000;
    if(timeSpent >= 10){
        coins += 10;
        localStorage.setItem("surveyCoins", coins);
        alert("🎉 10 Coins Earned!");
        update();
    } else {
        alert("❌ Stay at least 10 seconds to earn coins!");
    }
    adStartTime = 0;
});
</script>
</body>
</html>
